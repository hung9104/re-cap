train_file: ''
val_file: ''

bert_config: 'configs/config_bert_stride3.json'

image_res: 384
batch_size_train: 32
batch_size_test: 64
vision_width: 768
clip_name: "ViT-B-16"

text_encoder: 'bert-base-multilingual-cased'
use_checkpoint: true
threshold: 0.5

optimizer: {opt: adamW, lr: 3e-5, weight_decay: 0.02}
schedular: {sched: cosine, lr: 3e-5, epochs: 5, min_lr: 1e-6, decay_rate: 1, warmup_lr: 1e-5, warmup_epochs: 1, cooldown_epochs: 0}
